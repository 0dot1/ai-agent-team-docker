# i7 Team - Docker 完整部署方案 (含 OpenClaw Gateway)
# OpenClaw + Claude + Telegram + AI 团队

version: '3.8'

services:
  # ==================== OpenClaw Gateway (自建) ====================
  openclaw:
    build:
      context: ./openclaw-gateway
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - NODE_ENV=production
      - OPENCLAW_PORT=18789
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
    volumes:
      - ./config:/app/config
      - ./logs/gateway:/app/logs
    networks:
      - i7-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Redis 共享存储 ====================
  redis:
    image: redis:7-alpine
    container_name: i7-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - i7-network
    command: redis-server --appendonly yes

  # ==================== i7 Team Agents ====================
  
  # i10 - 项目经理
  agent-pm:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: i10-pm
    restart: unless-stopped
    environment:
      - AGENT_ROLE=pm
      - AGENT_NAME=项目经理 i10
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_PM}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - SYSTEM_PROMPT=你是项目经理i10，i7团队负责人。向大魔王汇报，统筹全局，分配任务给团队成员。
    volumes:
      - ./logs/pm:/app/logs
    networks:
      - i7-network
    depends_on:
      - redis
      - openclaw

  # i9 - 设计师
  agent-ui:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: i9-ui
    restart: unless-stopped
    environment:
      - AGENT_ROLE=ui
      - AGENT_NAME=设计师 i9
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_UI}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - SYSTEM_PROMPT=你是UI设计师i9，负责UI/UX设计、交互设计、视觉规范制定。熟练使用Figma/Sketch。
    volumes:
      - ./logs/ui:/app/logs
    networks:
      - i7-network
    depends_on:
      - redis
      - openclaw

  # i8 - 大前端
  agent-frontend:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: i8-frontend
    restart: unless-stopped
    environment:
      - AGENT_ROLE=frontend
      - AGENT_NAME=大前端 i8
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_FRONTEND}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - SYSTEM_PROMPT=你是前端工程师i8，精通React/Vue/TypeScript/TailwindCSS。负责Web前端开发。
    volumes:
      - ./logs/frontend:/app/logs
    networks:
      - i7-network
    depends_on:
      - redis
      - openclaw

  # i6 - 全栈大佬
  agent-backend:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: i6-backend
    restart: unless-stopped
    environment:
      - AGENT_ROLE=backend
      - AGENT_NAME=全栈大佬 i6
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_BACKEND}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - SYSTEM_PROMPT=你是后端工程师i6，精通Node.js/Python/Go、PostgreSQL/MongoDB。负责后端API开发。
    volumes:
      - ./logs/backend:/app/logs
    networks:
      - i7-network
    depends_on:
      - redis
      - openclaw

  # i5 - App小研
  agent-app:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: i5-app
    restart: unless-stopped
    environment:
      - AGENT_ROLE=app
      - AGENT_NAME=App小研 i5
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_APP}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - SYSTEM_PROMPT=你是移动端工程师i5，精通Flutter/React Native/iOS/Android。负责App开发。
    volumes:
      - ./logs/app:/app/logs
    networks:
      - i7-network
    depends_on:
      - redis
      - openclaw

  # i3 - 安全大哥
  agent-security:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: i3-security
    restart: unless-stopped
    environment:
      - AGENT_ROLE=security
      - AGENT_NAME=安全大哥 i3
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_SECURITY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - SYSTEM_PROMPT=你是安全工程师i3，负责代码安全审查、漏洞扫描。检查SQL注入/XSS/CSRF等安全问题。
    volumes:
      - ./logs/security:/app/logs
    networks:
      - i7-network
    depends_on:
      - redis
      - openclaw

  # i1 - 运营大师
  agent-ops:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: i1-ops
    restart: unless-stopped
    environment:
      - AGENT_ROLE=ops
      - AGENT_NAME=运营大师 i1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_OPS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-haiku-20240307}
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_URL=http://openclaw:18789
      - SYSTEM_PROMPT=你是运营专家i1，擅长内容运营、用户增长、数据分析。熟悉小红书/抖音/公众号运营。
    volumes:
      - ./logs/ops:/app/logs
    networks:
      - i7-network
    depends_on:
      - redis
      - openclaw

  # ==================== Nginx 反向代理 (可选) ====================
  nginx:
    image: nginx:alpine
    container_name: i7-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - i7-network
    depends_on:
      - openclaw
    profiles:
      - nginx

  # ==================== 监控 (可选) ====================
  prometheus:
    image: prom/prometheus
    container_name: i7-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - i7-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana
    container_name: i7-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - i7-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

networks:
  i7-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data: